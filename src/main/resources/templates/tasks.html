<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <style>
        body {
            background-color: #f8f9fa; /* Light gray background */
        }
        .container {
            background-color: #ffffff; /* White container */
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1 class="text-center display-4">Todo List</h1>
    <form method="post" action="#" th:action="@{/frontend/add}" th:object="${taskDto}" class="add-task-form d-flex justify-content-between mb-3">
        <input type="text" th:field="*{taskDescription}" placeholder="Enter a new task" required class="form-control form-control-lg">
        <select th:field="*{taskStatus}" class="form-select form-select-lg">
            <option value="PENDING">Pending</option>
            <option value="HOLD">On Hold</option>
            <option value="COMPLETED">Completed</option>
        </select>
        <button type="submit" class="btn btn-primary btn-lg">Add Task</button>
    </form>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Description</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks}">
            <td th:text="${task.taskDescription}"></td>
            <td>
                <form method="post" th:action="@{/frontend/update}" th:object="${taskDto}" class="inline-form">
                    <select th:field="*{taskStatus}" th:field=*"{taskId}" onchange="this.form.submit()">
                        <option th:value="PENDING" th:selected="${task.taskStatus == 'PENDING'}">Pending</option>
                        <option th:value="HOLD" th:selected="${task.taskStatus == 'HOLD'}">On Hold</option>
                        <option th:value="COMPLETED" th:selected="${task.taskStatus == 'COMPLETED'}">Completed</option>
                    </select>
                </form>
            </td>
            <td>
                <div class="d-flex">
                    <form method="get" th:action="@{/editTask(taskId=${task.taskId})}" class="inline-form me-2">
                        <button type="submit" class="btn btn-sm btn-outline-success">Edit</button>
                    </form>
                    <form method="post" th:action="@{/frontend/task/delete/{taskId}(taskId=${task.taskId})}" class="inline-form">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVFQWjxhNqjv/iYZifbeiYVgYrVuLN9fTAyGtM9eULidtT9hC0Vl9" crossorigin="anonymous"></script>
</body>
</html>
